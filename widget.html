<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#8B5A2B">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="مواقيت الصلاة">
    <link rel="manifest" href="./widget-manifest.json">
    <link rel="apple-touch-icon" href="./icon-192.png">
    <title>مواقيت الصلاة - موسوعة المسلم</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@400;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(145deg, #faf8f5 0%, #f5f0e8 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 15px 10px;
        }
        
        /* --- ويدجت الصلاة النهائية - 3 أقسام --- */
        .prayer-widget-final { 
            background: linear-gradient(145deg, #faf8f5 0%, #f5f0e8 100%); 
            width: 98%; 
            max-width: 480px; 
            border-radius: 20px; 
            padding: 0; 
            margin-top: 10px; 
            box-shadow: 
                15px 15px 40px rgba(139,125,107,0.2),
                -15px -15px 40px rgba(255,255,255,0.9);
            overflow: hidden;
        }
        
        /* Section 1: Date & Location */
        .section-date {
            background: linear-gradient(145deg, #f0ebe3 0%, #e8e2d8 100%);
            padding: 15px;
            text-align: center;
            box-shadow: inset 0 -2px 4px rgba(139,125,107,0.1);
        }
        .hijri-final { 
            font-size: 1.3rem; 
            color: #000000;
            font-family: 'Amiri', serif;
            font-weight: 700;
            margin-bottom: 8px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }
        .day-gregorian {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }
        .day-final { 
            font-size: 1.1rem; 
            font-weight: 600; 
            color: #000000;
            font-family: 'Amiri', serif;
        }
        .separator {
            color: #a89f91;
            opacity: 0.6;
        }
        .gregorian-final { 
            font-size: 0.9rem; 
            color: #000000;
            font-family: 'Tajawal', sans-serif;
        }
        .location-final { 
            font-size: 0.75rem; 
            color: #7a6b5d;
            font-family: 'Tajawal', sans-serif;
            background: rgba(255,255,255,0.5);
            padding: 4px 14px;
            border-radius: 15px;
            display: inline-block;
            box-shadow: inset 1px 1px 3px rgba(0,0,0,0.05);
        }
        
        /* Section 2: All Prayer Times */
        .section-prayers {
            background: linear-gradient(145deg, #fffcfa 0%, #faf7f2 100%);
            padding: 15px 12px;
            box-shadow: inset 0 -2px 4px rgba(139,125,107,0.08);
        }
        .prayer-row {
            display: flex;
            justify-content: space-between;
            gap: 6px;
        }
        .prayer-item-final {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            padding: 6px 4px;
            background: linear-gradient(145deg, #ffffff 0%, #f7f4ef 100%);
            border-radius: 10px;
            box-shadow: 
                2px 2px 6px rgba(139,125,107,0.1),
                -2px -2px 6px rgba(255,255,255,0.9);
            flex: 1;
            min-width: 0;
            transition: all 0.3s ease;
        }
        .prayer-item-final.active {
            background: linear-gradient(145deg, #6b5b4f 0%, #5d4e37 100%);
            transform: translateY(-2px);
            box-shadow: 
                4px 4px 15px rgba(107,91,79,0.3),
                -4px -4px 15px rgba(255,255,255,0.9);
        }
        .prayer-item-final.active .prayer-label-final,
        .prayer-item-final.active .prayer-time-final {
            color: #faf8f5;
        }
        .prayer-label-final {
            font-size: 0.6rem;
            color: #5d4e37;
            font-family: 'Tajawal', sans-serif;
            font-weight: 500;
        }
        .prayer-time-final {
            font-family: 'Tajawal', monospace;
            font-size: 0.8rem;
            font-weight: 700;
            color: #3d3229;
            direction: ltr;
        }
        
        /* Section 3: Next Prayer Countdown */
        .section-countdown {
            background: linear-gradient(145deg, #f0ebe3 0%, #e8e2d8 100%);
            padding: 20px;
            text-align: center;
            transition: all 0.3s ease;
        }
        .section-countdown.active-next {
            background: linear-gradient(145deg, #e8e2d8 0%, #ddd5c8 100%);
        }
        .next-prayer-title-final {
            font-size: 0.9rem;
            color: #6b5b4f;
            font-family: 'Tajawal', sans-serif;
            margin-bottom: 15px;
        }
        .next-prayer-title-final span {
            color: #4a4039;
            font-weight: 700;
            font-size: 1.2rem;
            font-family: 'Amiri', serif;
        }
        .countdown-box-final {
            display: flex;
            justify-content: space-between;
            padding: 0 15px;
            gap: 8px;
        }
        .countdown-digit {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            padding: 20px 24px;
            background: linear-gradient(145deg, #f5f0e8 0%, #e8e2d8 100%);
            border-radius: 16px;
            box-shadow: 
                4px 4px 10px rgba(139,125,107,0.15),
                -4px -4px 10px rgba(255,255,255,0.8);
            min-width: 90px;
            flex: 1;
        }
        .digit-value {
            font-family: 'Tajawal', monospace;
            font-size: 3rem;
            font-weight: 700;
            color: #3d3229;
            direction: ltr;
            line-height: 1;
        }
        .digit-label {
            font-size: 0.7rem;
            color: #7a6b5d;
            font-family: 'Tajawal', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        /* Very subtle animation like mobile clock */
        @keyframes digitChange {
            0% { color: #5d4e37; }
            50% { color: #8b7355; }
            100% { color: #3d3229; }
        }
        .digit-value.changing {
            animation: digitChange 0.3s ease-in-out;
        }
        
        .open-app-btn {
            display: block;
            width: 100%;
            padding: 12px;
            background: linear-gradient(145deg, #8B5A2B 0%, #6b4423 100%);
            color: #fff;
            text-align: center;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .open-app-btn:hover {
            opacity: 0.9;
        }
        
        .loading, .error {
            text-align: center;
            padding: 40px 20px;
            color: #8B5A2B;
        }
        
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(139,90,43,0.2);
            border-top-color: #8B5A2B;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Compact mode */
        @media (max-width: 350px) {
            .countdown-digit {
                padding: 15px 18px;
                min-width: 70px;
            }
            .digit-value {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="prayer-widget-final" id="widget-container">
        <!-- Section 1: Date & Location -->
        <div class="section-date">
            <div class="hijri-final" id="hijri-date">---</div>
            <div class="day-gregorian">
                <span class="day-final" id="day-name">---</span>
                <span class="separator">|</span>
                <span class="gregorian-final" id="gregorian-date">---</span>
            </div>
            <div class="location-final" id="prayer-location">جاري تحديد الموقع...</div>
        </div>
        
        <!-- Section 2: All Prayer Times - Single Row -->
        <div class="section-prayers">
            <div class="prayer-row">
                <div class="prayer-item-final" id="final-fajr">
                    <span class="prayer-label-final">الفجر</span>
                    <span class="prayer-time-final" id="widget-fajr">--:--</span>
                </div>
                <div class="prayer-item-final" id="final-sunrise">
                    <span class="prayer-label-final">الشروق</span>
                    <span class="prayer-time-final" id="widget-sunrise">--:--</span>
                </div>
                <div class="prayer-item-final" id="final-dhuhr">
                    <span class="prayer-label-final">الظهر</span>
                    <span class="prayer-time-final" id="widget-dhuhr">--:--</span>
                </div>
                <div class="prayer-item-final" id="final-asr">
                    <span class="prayer-label-final">العصر</span>
                    <span class="prayer-time-final" id="widget-asr">--:--</span>
                </div>
                <div class="prayer-item-final" id="final-maghrib">
                    <span class="prayer-label-final">المغرب</span>
                    <span class="prayer-time-final" id="widget-maghrib">--:--</span>
                </div>
                <div class="prayer-item-final" id="final-isha">
                    <span class="prayer-label-final">العشاء</span>
                    <span class="prayer-time-final" id="widget-isha">--:--</span>
                </div>
            </div>
        </div>
        
        <!-- Section 3: Next Prayer Countdown - RTL like real clock -->
        <div class="section-countdown" id="section-countdown">
            <div class="next-prayer-title-final">الصلاة القادمة: <span id="next-prayer-name">---</span></div>
            <div class="countdown-box-final">
                <div class="countdown-digit">
                    <div class="digit-value" id="countdown-seconds">00</div>
                    <div class="digit-label">ثواني</div>
                </div>
                <div class="countdown-digit">
                    <div class="digit-value" id="countdown-minutes">00</div>
                    <div class="digit-label">دقائق</div>
                </div>
                <div class="countdown-digit">
                    <div class="digit-value" id="countdown-hours">00</div>
                    <div class="digit-label">ساعات</div>
                </div>
            </div>
        </div>
        
        <button class="open-app-btn" onclick="openMainApp()">
            📱 فتح تطبيق موسوعة المسلم
        </button>
    </div>

    <script>
        const hijriMonths = ['محرم', 'صفر', 'ربيع الأول', 'ربيع الثاني', 'جمادى الأولى', 'جمادى الثانية', 'رجب', 'شعبان', 'رمضان', 'شوال', 'ذو القعدة', 'ذو الحجة'];
        const arabicDays = ['الأحد', 'الإثنين', 'الثلاثاء', 'الأربعاء', 'الخميس', 'الجمعة', 'السبت'];
        
        let countdownInterval = null;

        function getArabicDayName(date) {
            return arabicDays[date.getDay()];
        }

        function gregorianToHijri(date) {
            const gYear = date.getFullYear();
            const gMonth = date.getMonth() + 1;
            const gDay = date.getDate();
            
            let jd = Math.floor((1461 * (gYear + 4800 + Math.floor((gMonth - 14) / 12))) / 4) +
                     Math.floor((367 * (gMonth - 2 - 12 * Math.floor((gMonth - 14) / 12))) / 12) -
                     Math.floor((3 * Math.floor((gYear + 4900 + Math.floor((gMonth - 14) / 12)) / 100)) / 4) +
                     gDay - 32075;
            
            let l = jd - 1948440 + 10632;
            let n = Math.floor((l - 1) / 10631);
            l = l - 10631 * n + 354;
            let j = Math.floor((Math.floor((10985 - l) / 5316)) * (Math.floor((50 * l) / 17719))) + Math.floor((Math.floor(l / 5670)) * (Math.floor((43 * l) / 15238)));
            l = l - (Math.floor((30 - j) / 15)) * (Math.floor((17719 * j) / 50)) - (Math.floor(j / 16)) * (Math.floor((15238 * j) / 43)) + 29;
            
            const hMonth = Math.floor((24 * l) / 709);
            const hDay = Math.floor(l - Math.floor((709 * hMonth) / 24));
            const hYear = 30 * n + j - 30;
            
            return {
                day: hDay,
                month: hijriMonths[hMonth - 1],
                year: hYear
            };
        }

        function formatTime(time24) {
            const [h, m] = time24.split(':');
            let hour = parseInt(h);
            const ampm = hour >= 12 ? 'م' : 'ص';
            hour = hour > 12 ? hour - 12 : (hour === 0 ? 12 : hour);
            return `${hour}:${m} ${ampm}`;
        }

        async function fetchPrayerTimes(lat, lng) {
            const d = new Date();
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 10000);
                
                const response = await fetch(`https://api.aladhan.com/v1/timings/${d.getDate()}-${d.getMonth()+1}-${d.getFullYear()}?latitude=${lat}&longitude=${lng}&method=5`, {
                    signal: controller.signal
                });
                clearTimeout(timeoutId);
                
                if (!response.ok) throw new Error('Network error');
                
                const data = await response.json();
                
                if (!data || !data.data || !data.data.timings) {
                    throw new Error('Invalid data');
                }
                
                // Save timezone from API for proper date calculations
                if (data.data.meta && data.data.meta.timezone) {
                    window.prayerTimezone = data.data.meta.timezone;
                }
                
                return data.data;
            } catch (e) {
                console.error('Error fetching prayer times:', e);
                return null;
            }
        }

        async function getHijriDate() {
            const now = new Date();
            try {
                const response = await fetch(`https://api.aladhan.com/v1/gToH/${now.getDate()}-${now.getMonth()+1}-${now.getFullYear()}`);
                const data = await response.json();
                if (data && data.data && data.data.hijri) {
                    return `${data.data.hijri.day} ${data.data.hijri.month.ar} ${data.data.hijri.year}هـ`;
                }
            } catch (e) {
                console.error('Error fetching Hijri date:', e);
            }
            const hijri = gregorianToHijri(now);
            return `${hijri.day} ${hijri.month} ${hijri.year}هـ`;
        }

        async function getCityName(lat, lng) {
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 5000);
                const response = await fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lng}&localityLanguage=ar`, {
                    signal: controller.signal
                });
                clearTimeout(timeoutId);
                
                if (response.ok) {
                    const data = await response.json();
                    // Return city name in Arabic, fallback to English
                    return data.city || data.locality || data.principalSubdivision || 'الموقع الحالي';
                }
            } catch (e) {
                console.log('Could not fetch city name:', e);
            }
            return 'الموقع الحالي';
        }

        function getLocation() {
            return new Promise((resolve) => {
                // First check URL params
                const urlParams = new URLSearchParams(window.location.search);
                const lat = urlParams.get('lat');
                const lng = urlParams.get('lng');
                const city = urlParams.get('city');
                
                if (lat && lng) {
                    resolve({ lat: parseFloat(lat), lng: parseFloat(lng), city: city || 'القاهرة' });
                    return;
                }
                
                // Try geolocation
                if (navigator.geolocation) {
                    document.getElementById('prayer-location').innerText = 'جاري تحديد الموقع...';
                    
                    navigator.geolocation.getCurrentPosition(
                        async (position) => {
                            const lat = position.coords.latitude;
                            const lng = position.coords.longitude;
                            
                            // Check if location is near Cairo (within ~50km)
                            const cairoLat = 30.0444;
                            const cairoLng = 31.2357;
                            const distance = Math.sqrt(
                                Math.pow(lat - cairoLat, 2) + Math.pow(lng - cairoLng, 2)
                            );
                            
                            let city;
                            if (distance < 0.5) {
                                city = 'القاهرة';
                            } else {
                                // Try to get city name from reverse geocoding
                                city = await getCityName(lat, lng);
                            }
                            
                            resolve({ lat: lat, lng: lng, city: city });
                        },
                        (error) => {
                            console.log('Geolocation error:', error);
                            // Default to Cairo
                            resolve({ lat: 30.0444, lng: 31.2357, city: 'القاهرة' });
                        },
                        { 
                            timeout: 10000, 
                            enableHighAccuracy: true,
                            maximumAge: 600000 // Accept positions up to 10 minutes old
                        }
                    );
                } else {
                    // Default to Cairo
                    resolve({ lat: 30.0444, lng: 31.2357, city: 'القاهرة' });
                }
            });
        }

        async function updateDate() {
            const now = new Date();
            
            // Update Gregorian date
            const gregorianEl = document.getElementById('gregorian-date');
            if (gregorianEl) {
                gregorianEl.innerText = now.toLocaleDateString('ar-EG', {day:'numeric', month:'long', year:'numeric'});
            }
            
            // Update day name
            const dayEl = document.getElementById('day-name');
            if (dayEl) dayEl.innerText = getArabicDayName(now);
            
            // Get Hijri date
            const hijriDate = await getHijriDate();
            const hijriEl = document.getElementById('hijri-date');
            if (hijriEl) hijriEl.innerText = hijriDate;
        }

        async function renderWidget() {
            const location = await getLocation();
            
            // Update location display
            const locationEl = document.getElementById('prayer-location');
            if (locationEl) locationEl.innerText = '📍 ' + location.city;
            
            const prayerData = await fetchPrayerTimes(location.lat, location.lng);
            
            if (!prayerData) {
                document.getElementById('prayer-location').innerText = '⚠️ تعذر تحميل البيانات';
                return;
            }

            const timings = prayerData.timings;
            const now = new Date();
            
            const prayers = [
                {id:'Fajr',n:'الفجر'},
                {id:'Sunrise',n:'الشروق'},
                {id:'Dhuhr',n:'الظهر'},
                {id:'Asr',n:'العصر'},
                {id:'Maghrib',n:'المغرب'},
                {id:'Isha',n:'العشاء'}
            ];
            
            let nextT=null, nextN='', nextId='';
            
            prayers.forEach(p => {
                let [h, m] = timings[p.id].split(':');
                let pDate = new Date(now.getFullYear(), now.getMonth(), now.getDate(), h, m, 0);
                
                // Update prayer time display
                const timeEl = document.getElementById('widget-' + p.id.toLowerCase());
                if (timeEl) {
                    timeEl.innerText = formatTime(timings[p.id]);
                }
                
                // Find next prayer (skip Sunrise)
                if (pDate > now && !nextT && p.id !== 'Sunrise') {
                    nextT = pDate;
                    nextN = p.n;
                    nextId = p.id.toLowerCase();
                }
            });
            
            // If no next prayer today, next is Fajr tomorrow
            if (!nextT) {
                let [h, m] = timings.Fajr.split(':');
                nextT = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1, h, m, 0);
                nextN = 'الفجر';
                nextId = 'fajr';
                
                // Reset all active states
                document.querySelectorAll('.prayer-item-final').forEach(el => el.classList.remove('active'));
                const fajrEl = document.getElementById('final-fajr');
                if (fajrEl) fajrEl.classList.add('active');
            } else {
                // Highlight active prayer
                document.querySelectorAll('.prayer-item-final').forEach(el => el.classList.remove('active'));
                const activeEl = document.getElementById('final-' + nextId);
                if (activeEl) activeEl.classList.add('active');
            }
            
            // Update next prayer name
            const nextPrayerEl = document.getElementById('next-prayer-name');
            if (nextPrayerEl) nextPrayerEl.innerText = nextN;
            
            // Highlight countdown section
            const countdownSection = document.getElementById('section-countdown');
            if (countdownSection) countdownSection.classList.add('active-next');
            
            // Clear existing interval
            if (countdownInterval) clearInterval(countdownInterval);
            
            // Start countdown
            countdownInterval = setInterval(() => {
                let diff = nextT - new Date();
                if (diff > 0) {
                    let h = Math.floor((diff / 3600000) % 24);
                    let m = Math.floor((diff / 60000) % 60);
                    let s = Math.floor((diff / 1000) % 60);
                    
                    const secondsEl = document.getElementById('countdown-seconds');
                    const minutesEl = document.getElementById('countdown-minutes');
                    const hoursEl = document.getElementById('countdown-hours');
                    
                    if (secondsEl) secondsEl.innerText = s.toString().padStart(2, '0');
                    if (minutesEl) minutesEl.innerText = m.toString().padStart(2, '0');
                    if (hoursEl) hoursEl.innerText = h.toString().padStart(2, '0');
                }
            }, 1000);
            
            // Initial countdown update
            const initialDiff = nextT - new Date();
            if (initialDiff > 0) {
                let h = Math.floor((initialDiff / 3600000) % 24);
                let m = Math.floor((initialDiff / 60000) % 60);
                let s = Math.floor((initialDiff / 1000) % 60);
                
                const secondsEl = document.getElementById('countdown-seconds');
                const minutesEl = document.getElementById('countdown-minutes');
                const hoursEl = document.getElementById('countdown-hours');
                
                if (secondsEl) secondsEl.innerText = s.toString().padStart(2, '0');
                if (minutesEl) minutesEl.innerText = m.toString().padStart(2, '0');
                if (hoursEl) hoursEl.innerText = h.toString().padStart(2, '0');
            }
        }

        function openMainApp() {
            window.location.href = './index.html';
        }

        // Initialize
        updateDate();
        renderWidget();
        
        // Auto-refresh every minute for date
        setInterval(() => {
            updateDate();
        }, 60000);
        
        // Auto-refresh page every 10 minutes to get fresh prayer times
        setInterval(() => {
            location.reload();
        }, 600000);
    </script>
</body>
</html>
