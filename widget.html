<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#8B5A2B">
    <title>مواقيت الصلاة - موسوعة المسلم</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@400;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(145deg, #faf8f5 0%, #f5f0e8 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
        }
        
        .widget-container {
            width: 100%;
            max-width: 400px;
            background: linear-gradient(145deg, #faf8f5 0%, #f5f0e8 100%);
            border-radius: 24px;
            box-shadow: 
                15px 15px 40px rgba(139,125,107,0.2), 
                -15px -15px 40px rgba(255,255,255,0.9),
                inset 0 1px 0 rgba(255,255,255,0.8);
            overflow: hidden;
            border: 1px solid rgba(139,125,107,0.1);
        }
        
        .widget-header {
            background: linear-gradient(145deg, #8B5A2B 0%, #6b4423 100%);
            padding: 18px;
            text-align: center;
            color: #fff;
        }
        
        .widget-app-name {
            font-size: 0.85rem;
            opacity: 0.9;
            margin-bottom: 4px;
            font-weight: 500;
        }
        
        .widget-date {
            background: linear-gradient(145deg, #f0ebe3 0%, #e8e2d8 100%);
            padding: 16px;
            text-align: center;
            border-bottom: 1px solid rgba(139,125,107,0.1);
        }
        
        .widget-hijri {
            font-size: 1.25rem;
            color: #3d3229;
            font-family: 'Amiri', serif;
            font-weight: 700;
            margin-bottom: 6px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        
        .widget-gregorian {
            font-size: 0.9rem;
            color: #5d4e37;
            margin-bottom: 4px;
        }
        
        .widget-day {
            font-size: 1rem;
            color: #8B5A2B;
            font-weight: 600;
        }
        
        .widget-prayers {
            background: linear-gradient(145deg, #fffcfa 0%, #faf7f2 100%);
            padding: 14px 10px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }
        
        .widget-prayer-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 12px 6px;
            background: linear-gradient(145deg, #ffffff 0%, #f7f4ef 100%);
            border-radius: 14px;
            box-shadow: 
                3px 3px 8px rgba(139,125,107,0.12), 
                -3px -3px 8px rgba(255,255,255,0.9);
            transition: all 0.3s ease;
            border: 1px solid rgba(139,125,107,0.05);
        }
        
        .widget-prayer-item.active {
            background: linear-gradient(145deg, #8B5A2B 0%, #6b4423 100%);
            color: #faf8f5;
            box-shadow: 
                0 4px 15px rgba(139,125,107,0.3),
                inset 0 1px 0 rgba(255,255,255,0.2);
            transform: translateY(-2px);
        }
        
        .widget-prayer-name {
            color: #5d4e37;
            font-weight: 600;
            font-size: 0.75rem;
        }
        
        .widget-prayer-item.active .widget-prayer-name {
            color: #faf8f5;
        }
        
        .widget-prayer-time {
            font-family: 'Tajawal', monospace;
            font-size: 0.9rem;
            font-weight: 700;
            color: #3d3229;
            direction: ltr;
        }
        
        .widget-prayer-item.active .widget-prayer-time {
            color: #faf8f5;
            font-size: 1rem;
        }
        
        .loading, .error {
            text-align: center;
            padding: 40px 20px;
            color: #8B5A2B;
        }
        
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(139,90,43,0.2);
            border-top-color: #8B5A2B;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .retry-btn {
            background: linear-gradient(145deg, #8B5A2B 0%, #6b4423 100%);
            color: #fff;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-family: 'Tajawal', sans-serif;
            font-size: 0.9rem;
            cursor: pointer;
            margin-top: 15px;
        }
        
        .widget-countdown {
            background: linear-gradient(145deg, #3d3229 0%, #2c241e 100%);
            padding: 18px;
            text-align: center;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        
        .widget-next-prayer {
            font-size: 0.85rem;
            color: #c0b0a0;
            margin-bottom: 12px;
            font-weight: 500;
        }
        
        .widget-next-prayer span {
            color: #ffffff;
            font-weight: 700;
            font-size: 1.15rem;
            font-family: 'Amiri', serif;
        }
        
        .widget-countdown-box {
            display: flex;
            justify-content: center;
            gap: 12px;
        }
        
        .widget-countdown-digit {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            padding: 14px 16px;
            background: linear-gradient(145deg, #2c2c2c 0%, #1a1a1a 100%);
            border-radius: 14px;
            box-shadow: 
                0 4px 0 #0d0d0d, 
                0 6px 12px rgba(0,0,0,0.3), 
                inset 0 1px 0 rgba(255,255,255,0.1);
            min-width: 60px;
        }
        
        .widget-digit-value {
            font-family: 'Tajawal', monospace;
            font-size: 2rem;
            font-weight: 700;
            color: #ffffff;
            direction: ltr;
            text-shadow: 0 0 15px rgba(255,255,255,0.4);
            line-height: 1;
        }
        
        .widget-digit-label {
            font-size: 0.6rem;
            color: #a0a0a0;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 500;
        }
        
        .widget-location {
            text-align: center;
            padding: 10px;
            background: rgba(139,125,107,0.05);
            font-size: 0.8rem;
            color: #5d4e37;
            border-top: 1px solid rgba(139,125,107,0.1);
        }
        
        .widget-location-icon {
            margin-left: 4px;
        }
        
        /* Dark mode support */
        @media (prefers-color-scheme: dark) {
            body {
                background: linear-gradient(145deg, #1a1511 0%, #2a2018 100%);
            }
            .widget-container {
                background: linear-gradient(145deg, #2a2018 0%, #1a1511 100%);
                box-shadow: 
                    15px 15px 40px rgba(0,0,0,0.4), 
                    -15px -15px 40px rgba(60,50,40,0.1);
            }
            .widget-date {
                background: linear-gradient(145deg, #2a2018 0%, #1a1511 100%);
            }
            .widget-hijri, .widget-day {
                color: #e0d8c8;
            }
            .widget-prayers {
                background: linear-gradient(145deg, #2a2018 0%, #1a1511 100%);
            }
            .widget-prayer-item {
                background: linear-gradient(145deg, #3d3229 0%, #2c241e 100%);
            }
            .widget-prayer-name {
                color: #c0b0a0;
            }
            .widget-prayer-time {
                color: #e0d8c8;
            }
            .widget-location {
                background: rgba(0,0,0,0.2);
                color: #c0b0a0;
            }
        }
        
        /* Compact mode for smaller widgets */
        .compact .widget-countdown-digit {
            padding: 10px 12px;
            min-width: 50px;
        }
        .compact .widget-digit-value {
            font-size: 1.5rem;
        }
        .compact .widget-digit-label {
            font-size: 0.5rem;
        }
    </style>
</head>
<body>
    <div class="widget-container" id="widget-container">
        <div class="widget-header">
            <div class="widget-app-name">موسوعة المسلم</div>
        </div>
        
        <div class="widget-date">
            <div class="widget-hijri" id="widget-hijri">---</div>
            <div class="widget-gregorian" id="widget-gregorian">---</div>
            <div class="widget-day" id="widget-day">---</div>
        </div>
        
        <div class="widget-prayers">
            <div class="widget-prayer-item" id="widget-fajr">
                <span class="widget-prayer-name">الفجر</span>
                <span class="widget-prayer-time">--:--</span>
            </div>
            <div class="widget-prayer-item" id="widget-sunrise">
                <span class="widget-prayer-name">الشروق</span>
                <span class="widget-prayer-time">--:--</span>
            </div>
            <div class="widget-prayer-item" id="widget-dhuhr">
                <span class="widget-prayer-name">الظهر</span>
                <span class="widget-prayer-time">--:--</span>
            </div>
            <div class="widget-prayer-item" id="widget-asr">
                <span class="widget-prayer-name">العصر</span>
                <span class="widget-prayer-time">--:--</span>
            </div>
            <div class="widget-prayer-item" id="widget-maghrib">
                <span class="widget-prayer-name">المغرب</span>
                <span class="widget-prayer-time">--:--</span>
            </div>
            <div class="widget-prayer-item" id="widget-isha">
                <span class="widget-prayer-name">العشاء</span>
                <span class="widget-prayer-time">--:--</span>
            </div>
        </div>
        
        <div class="widget-countdown">
            <div class="widget-next-prayer">الصلاة القادمة: <span id="widget-next-name">---</span></div>
            <div class="widget-countdown-box">
                <div class="widget-countdown-digit">
                    <div class="widget-digit-value" id="widget-seconds">00</div>
                    <div class="widget-digit-label">ثواني</div>
                </div>
                <div class="widget-countdown-digit">
                    <div class="widget-digit-value" id="widget-minutes">00</div>
                    <div class="widget-digit-label">دقائق</div>
                </div>
                <div class="widget-countdown-digit">
                    <div class="widget-digit-value" id="widget-hours">00</div>
                    <div class="widget-digit-label">ساعات</div>
                </div>
            </div>
        </div>
        
        <div class="widget-location" id="widget-location">
            <span class="widget-location-icon">📍</span>
            <span id="location-text">جاري تحديد الموقع...</span>
        </div>
    </div>

    <script>
        const hijriMonths = ['محرم', 'صفر', 'ربيع الأول', 'ربيع الثاني', 'جمادى الأولى', 'جمادى الثانية', 'رجب', 'شعبان', 'رمضان', 'شوال', 'ذو القعدة', 'ذو الحجة'];
        const arabicDays = ['الأحد', 'الإثنين', 'الثلاثاء', 'الأربعاء', 'الخميس', 'الجمعة', 'السبت'];
        
        let countdownInterval = null;

        function getArabicDayName(date) {
            return arabicDays[date.getDay()];
        }

        function gregorianToHijri(date) {
            const gYear = date.getFullYear();
            const gMonth = date.getMonth() + 1;
            const gDay = date.getDate();
            
            let jd = Math.floor((1461 * (gYear + 4800 + Math.floor((gMonth - 14) / 12))) / 4) +
                     Math.floor((367 * (gMonth - 2 - 12 * Math.floor((gMonth - 14) / 12))) / 12) -
                     Math.floor((3 * Math.floor((gYear + 4900 + Math.floor((gMonth - 14) / 12)) / 100)) / 4) +
                     gDay - 32075;
            
            let l = jd - 1948440 + 10632;
            let n = Math.floor((l - 1) / 10631);
            l = l - 10631 * n + 354;
            let j = Math.floor((Math.floor((10985 - l) / 5316)) * (Math.floor((50 * l) / 17719))) + Math.floor((Math.floor(l / 5670)) * (Math.floor((43 * l) / 15238)));
            l = l - (Math.floor((30 - j) / 15)) * (Math.floor((17719 * j) / 50)) - (Math.floor(j / 16)) * (Math.floor((15238 * j) / 43)) + 29;
            
            const hMonth = Math.floor((24 * l) / 709);
            const hDay = Math.floor(l - Math.floor((709 * hMonth) / 24));
            const hYear = 30 * n + j - 30;
            
            return {
                day: hDay,
                month: hijriMonths[hMonth - 1],
                year: hYear
            };
        }

        async function fetchPrayers(lat, lng) {
            const d = new Date();
            try {
                // Add timeout for Android compatibility
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 10000);
                
                const response = await fetch(`https://api.aladhan.com/v1/timings/${d.getDate()}-${d.getMonth()+1}-${d.getFullYear()}?latitude=${lat}&longitude=${lng}&method=5`, {
                    signal: controller.signal
                });
                clearTimeout(timeoutId);
                
                if (!response.ok) throw new Error('Network error');
                
                const data = await response.json();
                
                if (!data || !data.data || !data.data.timings) {
                    throw new Error('Invalid data');
                }
                
                const t = data.data.timings;
                const prayers = [
                    {id:'Fajr',n:'الفجر'},
                    {id:'Sunrise',n:'الشروق'},
                    {id:'Dhuhr',n:'الظهر'},
                    {id:'Asr',n:'العصر'},
                    {id:'Maghrib',n:'المغرب'},
                    {id:'Isha',n:'العشاء'}
                ];
                
                let nextT=null, nextN='', now=new Date();
                
                prayers.forEach(p => {
                    let [h, m] = t[p.id].split(':');
                    let pDate = new Date(now.getFullYear(), now.getMonth(), now.getDate(), h, m, 0);
                    let h12 = h>12?h-12:(h==0?12:h);
                    
                    if(pDate > now && !nextT && p.id !== 'Sunrise') { 
                        nextT = pDate; 
                        nextN = p.n;
                    }
                    
                    const item = document.getElementById('widget-' + p.id.toLowerCase());
                    if(item) {
                        const timeEl = item.querySelector('.widget-prayer-time');
                        if(timeEl) timeEl.innerText = `${h12}:${m}`;
                        
                        if(nextN === p.n) {
                            item.classList.add('active');
                        } else {
                            item.classList.remove('active');
                        }
                    }
                });
                
                if(!nextT) { 
                    nextT = new Date(now.getFullYear(), now.getMonth(), now.getDate()+1, t.Fajr.split(':')[0], t.Fajr.split(':')[1], 0); 
                    nextN = 'الفجر';
                    document.querySelectorAll('.widget-prayer-item').forEach(el => el.classList.remove('active'));
                    const fajrEl = document.getElementById('widget-fajr');
                    if(fajrEl) fajrEl.classList.add('active');
                }
                
                const nextNameEl = document.getElementById('widget-next-name');
                if(nextNameEl) nextNameEl.innerText = nextN;
                
                // Clear existing interval
                if(countdownInterval) clearInterval(countdownInterval);
                
                // Start countdown
                countdownInterval = setInterval(() => {
                    let diff = nextT - new Date();
                    if(diff > 0) {
                        let h = Math.floor((diff/3600000)%24);
                        let m = Math.floor((diff/60000)%60);
                        let s = Math.floor((diff/1000)%60);
                        
                        const secondsEl = document.getElementById('widget-seconds');
                        const minutesEl = document.getElementById('widget-minutes');
                        const hoursEl = document.getElementById('widget-hours');
                        
                        if(secondsEl) secondsEl.innerText = s.toString().padStart(2,'0');
                        if(minutesEl) minutesEl.innerText = m.toString().padStart(2,'0');
                        if(hoursEl) hoursEl.innerText = h.toString().padStart(2,'0');
                    }
                }, 1000);
                
                // Initial countdown update
                const initialDiff = nextT - new Date();
                if(initialDiff > 0) {
                    let h = Math.floor((initialDiff/3600000)%24);
                    let m = Math.floor((initialDiff/60000)%60);
                    let s = Math.floor((initialDiff/1000)%60);
                    
                    const secondsEl = document.getElementById('widget-seconds');
                    const minutesEl = document.getElementById('widget-minutes');
                    const hoursEl = document.getElementById('widget-hours');
                    
                    if(secondsEl) secondsEl.innerText = s.toString().padStart(2,'0');
                    if(minutesEl) minutesEl.innerText = m.toString().padStart(2,'0');
                    if(hoursEl) hoursEl.innerText = h.toString().padStart(2,'0');
                }
                
            } catch(e) {
                console.error('Error fetching prayers:', e);
                showError('تعذر تحميل مواقيت الصلاة. تأكد من الاتصال بالإنترنت.');
            }
        }
        
        function showError(message) {
            const container = document.getElementById('widget-container');
            if(container) {
                container.innerHTML = `
                    <div class="error">
                        <div style="font-size: 2rem; margin-bottom: 10px;">⚠️</div>
                        <div>${message}</div>
                        <button class="retry-btn" onclick="location.reload()">إعادة المحاولة</button>
                    </div>
                `;
            }
        }

        async function updateDate() {
            const now = new Date();
            try {
                const d = now.getDate();
                const m = now.getMonth() + 1;
                const y = now.getFullYear();
                
                // Update Gregorian date
                const gregorianEl = document.getElementById('widget-gregorian');
                if(gregorianEl) {
                    gregorianEl.innerText = now.toLocaleDateString('ar-EG', {day:'numeric', month:'long', year:'numeric'});
                }
                
                // Update day name
                const dayEl = document.getElementById('widget-day');
                if(dayEl) dayEl.innerText = getArabicDayName(now);
                
                // Get Hijri date from API with timeout
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 5000);
                
                const data = await fetch(`https://api.aladhan.com/v1/gToH/${d}-${m}-${y}`, {
                    signal: controller.signal
                }).then(r => r.json());
                
                clearTimeout(timeoutId);
                
                if(data && data.data && data.data.hijri) {
                    const hijri = data.data.hijri;
                    const hijriEl = document.getElementById('widget-hijri');
                    if(hijriEl) hijriEl.innerText = `${hijri.day} ${hijri.month.ar} ${hijri.year}هـ`;
                } else {
                    const hijri = gregorianToHijri(now);
                    const hijriEl = document.getElementById('widget-hijri');
                    if(hijriEl) hijriEl.innerText = `${hijri.day} ${hijri.month} ${hijri.year}هـ`;
                }
            } catch(e) {
                // Fallback
                const gregorianEl = document.getElementById('widget-gregorian');
                if(gregorianEl) {
                    gregorianEl.innerText = now.toLocaleDateString('ar-EG', {day:'numeric', month:'long', year:'numeric'});
                }
                const dayEl = document.getElementById('widget-day');
                if(dayEl) dayEl.innerText = getArabicDayName(now);
                const hijri = gregorianToHijri(now);
                const hijriEl = document.getElementById('widget-hijri');
                if(hijriEl) hijriEl.innerText = `${hijri.day} ${hijri.month} ${hijri.year}هـ`;
            }
        }

        // Update location display
        function updateLocation(city) {
            const locationText = document.getElementById('location-text');
            if(locationText && city) {
                locationText.innerText = city;
            }
        }

        // Try to get location from parent or use default (Cairo)
        const urlParams = new URLSearchParams(window.location.search);
        const lat = urlParams.get('lat') || '30.0444';
        const lng = urlParams.get('lng') || '31.2357';
        const city = urlParams.get('city') || 'القاهرة';
        
        // Initialize
        updateDate();
        fetchPrayers(lat, lng);
        updateLocation(city);
        
        // Auto-refresh every minute for date
        setInterval(() => {
            updateDate();
        }, 60000);
        
        // Auto-refresh page every 10 minutes to get fresh prayer times
        setInterval(() => {
            location.reload();
        }, 600000);
    </script>
</body>
</html>
