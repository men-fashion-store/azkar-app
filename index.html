<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>موسوعة المسلم</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>

    <div id="main-header" class="top-header hidden">
        <button class="menu-trigger" onclick="toggleSidebar()">☰</button>
        <span id="header-title">موسوعة المسلم</span>
        <div style="width:40px;"></div>
    </div>

    <div id="sidebar-overlay" class="overlay" onclick="toggleSidebar()"></div>
    <div id="sidebar" class="sidebar">
        <div class="side-head"><h3>الإعدادات</h3><button onclick="toggleSidebar()">إغلاق</button></div>
        <div class="side-content">
            <button class="side-btn" onclick="toggleTheme()">الوضع الليلي / النهاري</button>
            <div class="font-tool">
                <label>حجم الخط</label>
                <input type="range" min="1.2" max="3" step="0.1" oninput="changeFontSizeSlider(this.value)">
            </div>
            <button class="side-btn" onclick="requestLocationPermission()">تفعيل الـ GPS الآن</button>
            <select id="manual-city-select" onchange="setManualLocation()" class="side-select">
                <option value="">تحديد الموقع يدوياً</option>
                <option value="30.8521,32.3167,القنطرة غرب">القنطرة غرب</option>
                <option value="30.5833,32.2667,الإسماعيلية">الإسماعيلية</option>
                <option value="30.0444,31.2357,القاهرة">القاهرة</option>
                <option value="31.2001,29.9187,الإسكندرية">الإسكندرية</option>
            </select>
            <button class="side-btn exit-btn" onclick="exitAppPrompt()">خروج من التطبيق</button>
        </div>
    </div>

    <div id="splash-screen" class="screen active splash-bg">
        <div class="splash-inner">
            <h1>موسوعة المسلم</h1>
            <div class="h-box">
                <p id="splash-hadith">جاري التحميل...</p>
                <small id="splash-proof"></small>
            </div>
            <button class="start-btn" onclick="navigateTo('home')">بِسْمِ اللَّهِ</button>
        </div>
    </div>

    <div id="home-screen" class="screen hidden">
        <div class="home-container">
            <div class="prayer-box" onclick="navigateTo('prayerTimes')">
                <span id="next-prayer-name">...</span>
                <div id="prayer-countdown" class="timer-text">00:00:00</div>
                <span id="prayer-location" class="location-tag">جاري التحديد...</span>
            </div>

            <div class="app-grid">
                <div class="app-card q-bg" onclick="navigateTo('quranIndex')"><span>المصحف</span></div>
                <div class="app-card a-bg" onclick="navigateTo('azkarMenu')"><span>الأذكار</span></div>
                <div class="app-card m-bg" onclick="navigateTo('masbaha')"><span>السبحة</span></div>
                <div class="app-card p-bg" onclick="navigateTo('prayerTimes')"><span>المواقيت</span></div>
                <div class="app-card qib-bg" onclick="navigateTo('qibla')"><span>البوصلة</span></div>
                <div class="app-card aud-bg" onclick="navigateTo('audioMenu')"><span>الصوتيات</span></div>
            </div>
        </div>
    </div>

    <div id="quranIndex-screen" class="screen hidden">
        <div class="page-content">
            <button class="nav-btn-full" onclick="navigateTo('bookmarks')">🔖 المحفوظات</button>
            <div id="surah-list" class="list-container"></div>
        </div>
    </div>

    <div id="quranReader-screen" class="screen hidden">
        <div class="quran-reader-wrap">
            <h2 id="current-surah-name"></h2>
            <div id="quran-text" class="quran-content"></div>
        </div>
        <button class="floating-plus" onclick="toggleQuranMenu()">+</button>
        <div id="quran-fab-menu" class="fab-menu hidden">
            <button onclick="playSelectedAyah()">استماع</button>
            <button onclick="showTafsir()">تفسير</button>
            <button onclick="toggleBookmarkBtn()">حفظ</button>
            <button onclick="goBack()">الفهرس</button>
        </div>
    </div>

    <div id="azkarMenu-screen" class="screen hidden">
        <div class="menu-stack">
            <button onclick="startAzkar('morning')">أذكار الصباح</button>
            <button onclick="startAzkar('evening')">أذكار المساء</button>
            <button onclick="startAzkar('sleep')">أذكار النوم</button>
            <button onclick="goBack()">رجوع</button>
        </div>
    </div>

    <div id="masbaha-screen" class="screen hidden">
        <div class="sebha-area">
            <div id="masbaha-count">0</div>
            <button class="sebha-btn" onclick="incrementMasbaha()">تسبيح</button>
            <button class="reset-sebha" onclick="resetMasbaha()">تصفير</button>
        </div>
    </div>

    <div id="prayerTimes-screen" class="screen hidden">
        <div class="page-content"><div id="prayer-times-list" class="p-list"></div></div>
    </div>

    <div id="tafsir-modal" class="modal hidden">
        <div class="modal-body">
            <div id="tafsir-text"></div>
            <button onclick="closeTafsirModal()">إغلاق</button>
        </div>
    </div>

    <div id="exit-modal" class="modal hidden">
        <div class="modal-body exit-card">
            <p>هل تريد الخروج؟</p>
            <div class="btn-group">
                <button onclick="confirmExit()">نعم</button>
                <button onclick="closeExitModal()">لا</button>
            </div>
        </div>
    </div>

    <div id="toast-msg"></div>
    <audio id="ayah-audio-player"></audio>
    <script src="script.js"></script>
</body>
</html>
