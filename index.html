<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>موسوعة المسلم</title>
    <meta property="og:title" content="موسوعة المسلم الشاملة">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>

    <div id="sidebar-overlay" class="sidebar-overlay" onclick="toggleSidebar()"></div>
    <div id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <h3>الإعدادات</h3>
            <button onclick="toggleSidebar()" class="close-sidebar">✖</button>
        </div>
        
        <div class="sidebar-section">
            <button class="sidebar-btn" onclick="toggleTheme()">🌙 الوضع الليلي / النهاري</button>
            <label style="display:block; text-align:center; margin:15px 0 10px;">حجم الخط (للتطبيق والأذكار)</label>
            <input type="range" id="font-slider" min="1.2" max="3.5" step="0.1" oninput="changeFontSizeSlider(this.value)" style="width: 100%;">
        </div>

        <div class="sidebar-section">
            <label style="display:block; text-align:center; margin-bottom:10px; color:var(--accent-color); font-weight:bold;">🔔 التنبيهات والأصوات</label>
            <select id="muezzin-select" class="sidebar-select" style="margin-bottom: 10px;">
                <option value="">صوت المؤذن (قريباً)</option>
                <option value="makkah">أذان مكة المكرمة</option>
                <option value="madinah">أذان المدينة المنورة</option>
                <option value="aqsa">أذان الأقصى</option>
            </select>
            <select id="alerts-select" class="sidebar-select" style="margin-bottom: 10px;">
                <option value="">إشعارات التنبيه (قريباً)</option>
                <option value="on">تفعيل تنبيهات الصلاة والأذكار</option>
                <option value="off">إيقاف التنبيهات</option>
            </select>
            <select id="reciter-settings-select" class="sidebar-select">
                <option value="">القارئ الافتراضي (قريباً)</option>
                <option value="afs">مشاري العفاسي</option>
                <option value="basit">عبد الباسط عبد الصمد</option>
                <option value="husary">محمود خليل الحصري</option>
            </select>
        </div>

        <div class="sidebar-section">
            <label style="display:block; text-align:center; margin-bottom:10px; color:var(--accent-color); font-weight:bold;">📍 الموقع الجغرافي</label>
            <button class="sidebar-btn" onclick="requestLocationPermission()" style="margin-bottom: 10px;">تحديث تلقائي (GPS)</button>
            <select id="manual-city-select" onchange="setManualLocation()" class="sidebar-select">
                <option value="">أو اختر مدينتك يدوياً 🌍</option>
                <option value="30.8521,32.3167,القنطرة غرب">القنطرة غرب</option>
                <option value="30.5833,32.2667,الإسماعيلية">الإسماعيلية</option>
                <option value="31.2565,32.2841,بورسعيد">بورسعيد</option>
                <option value="29.9668,32.5498,السويس">السويس</option>
                <option value="30.0444,31.2357,القاهرة">القاهرة</option>
                <option value="31.2001,29.9187,الإسكندرية">الإسكندرية</option>
                <option value="31.0379,31.3815,المنصورة">المنصورة</option>
                <option value="30.7865,31.0004,طنطا">طنطا</option>
                <option value="30.5877,31.5020,الزقازيق">الزقازيق</option>
            </select>
        </div>

        <div class="sidebar-section" style="border-bottom: none;">
            <button class="sidebar-btn" onclick="checkForUpdates()" style="margin-bottom: 10px;">🔄 التحديث لآخر إصدار</button>
            <button class="sidebar-btn" style="background-color: var(--accent-color); color: var(--bg-color);" onclick="shareApp()">📤 مشاركة التطبيق</button>
            <p style="font-size: 0.9rem; color: var(--accent-color); text-align: center; margin-top: 8px; font-family: 'Amiri', serif;">« الدال على الخير كفاعله »</p>
        </div>

        <div class="sidebar-item" style="margin-top: auto; border-bottom: none;">
            <button class="sidebar-btn exit-btn" onclick="exitAppPrompt()">🚪 خروج من التطبيق</button>
        </div>
    </div>

    <div id="main-header" class="top-header hidden">
        <button class="hamburger-btn" onclick="toggleSidebar()">☰</button>
        
        <div id="header-center" class="header-center">
            <span id="header-title" class="header-title">موسوعة المسلم</span>
            <span id="header-subtitle" class="header-subtitle hidden"></span>
        </div>
        
        <button id="header-search-icon" class="header-search-icon hidden" onclick="toggleTopSearch()">🔍</button>
        <input type="text" id="top-search-input" class="top-search-input hidden" placeholder="بحث..." onkeyup="handleTopSearch()">
    </div>

    <div id="splash-screen" class="screen active splash-bg">
        <div class="splash-overlay"></div>
        <div class="splash-content">
            <h2 class="splash-title">موسوعة المسلم</h2>
            <div class="hadith-box">
                <p id="splash-hadith" class="splash-text">جاري التحميل...</p>
                <p id="splash-proof" class="proof-text"></p>
            </div>
            <button class="btn enter-btn" onclick="navigateTo('home')">بِسْمِ اللَّهِ</button>
        </div>
    </div>

    <div id="home-screen" class="screen hidden">
        <button class="home-menu-btn" onclick="toggleSidebar()">☰</button>
        
        <div class="home-content">
            <div class="prayer-widget" onclick="navigateTo('prayerTimes')">
                <div class="prayer-info">
                    <span id="next-prayer-name">جاري الحساب...</span>
                    <span id="prayer-countdown">00:00:00</span>
                </div>
                <div class="prayer-location" id="prayer-location">📍 جاري استرجاع الموقع...</div>
            </div>

            <div class="main-grid">
                <button class="grid-btn" onclick="navigateTo('quranIndex')">📖<br>المصحف</button>
                <button class="grid-btn" onclick="navigateTo('audioMenu')">🎙️<br>الصوتيات</button>
                <button class="grid-btn" onclick="navigateTo('azkarMenu')">📿<br>الأذكار</button>
                <button class="grid-btn" onclick="navigateTo('masbaha')">👆<br>السبحة</button>
                <button class="grid-btn" onclick="navigateTo('prayerTimes')">🕌<br>المواقيت</button>
                <button class="grid-btn" onclick="navigateTo('hadithMenu')">📚<br>الحديث</button>
            </div>
        </div>
    </div>

    <div id="azkarMenu-screen" class="screen hidden">
        <div class="buttons-container" style="margin-top: 60px;">
            <button class="btn" onclick="startAzkar('morning')">☀️ أذكار الصباح</button>
            <button class="btn" onclick="startAzkar('evening')">🌙 أذكار المساء</button>
            <button class="btn" onclick="startAzkar('sleep')">💤 أذكار النوم</button>
            <button class="btn" onclick="startAzkar('prayer')">🕌 أذكار بعد الصلاة</button>
            <button class="btn" onclick="startAzkar('ruqyah')">🛡️ الرقية الشرعية</button>
        </div>
    </div>

    <div id="azkarReader-screen" class="screen hidden">
        <div class="progress-container" style="margin-top: 50px;"><div id="progress-bar" class="progress-bar"></div></div>
        <span id="progress-text" class="progress-text-under">١ من ٢٠</span>
        <div id="zikr-card" class="paper-card">
            <div id="zikr-text">...</div>
            <p id="zikr-proof" class="proof-text"></p>
            <button id="counter-btn" class="counter-circle"><span id="zikr-count">١</span></button>
        </div>
    </div>

    <div id="masbaha-screen" class="screen hidden">
        <div class="paper-card" style="justify-content: center; min-height: 60vh; margin-top: 60px;">
            <div class="masbaha-display" id="masbaha-count">0</div>
            <button class="masbaha-btn" onclick="incrementMasbaha()">سبّح</button>
            <button class="reset-btn" onclick="resetMasbaha()">🔄 تصفير العداد</button>
        </div>
    </div>

    <div id="hadithMenu-screen" class="screen hidden">
        <div class="buttons-container" style="margin-top: 60px;">
            <button class="btn" onclick="openHadithBook('bukhari')">📘 صحيح البخاري</button>
            <button class="btn" onclick="openHadithBook('muslim')">📗 صحيح مسلم</button>
            <button class="btn" onclick="openHadithBook('abudawud')">📙 سنن أبي داود</button>
        </div>
    </div>

    <div id="hadithReader-screen" class="screen hidden">
        <div class="paper-card" style="width: 95%; max-width: 800px; margin-top: 50px; padding: 20px 10px; background: transparent; box-shadow: none; border: none;">
            <div id="hadith-list-container" style="width: 100%; display: flex; flex-direction: column; gap: 20px;">
                </div>
        </div>
    </div>

    <div id="prayerTimes-screen" class="screen hidden">
        <div class="paper-card" style="margin-top: 60px;">
            <div id="prayer-times-list" style="width:100%;"></div>
        </div>
    </div>

    <div id="audioMenu-screen" class="screen hidden">
        <div class="audio-player-container" style="margin-top: 60px;">
            <input type="text" id="reciter-search" placeholder="🔍 ابحث عن قارئ..." onkeyup="filterReciters()">
            <select id="reciter-select" onchange="updateReciter()">
                <option value="">جاري التحميل...</option>
            </select>
            <select id="surah-select-audio" onchange="updateAudioSurah()">
                <option value="">اختر السورة...</option>
            </select>
            <audio id="global-quran-audio" controls style="width:100%; margin-top:10px;"></audio>
        </div>
        <div class="paper-card" style="min-height:20vh; justify-content:center;">
            <div id="now-playing-title" style="font-family:'Amiri'; color:var(--accent-color); font-size:1.4rem; padding: 10px;">🎧 اختر قارئ وسورة</div>
        </div>
    </div>

    <div id="quranIndex-screen" class="screen hidden">
        <div class="surah-grid-container" style="margin-top: 60px;">
            <button class="btn" style="width: 100%; margin-bottom: 20px; background-color: var(--accent-color); color: var(--bg-color);" onclick="navigateTo('bookmarks')">🔖 علاماتي المرجعية</button>
            <div id="surah-list" class="surah-grid"></div>
        </div>
    </div>

    <div id="bookmarks-screen" class="screen hidden">
        <div class="paper-card" style="width: 92%; padding: 20px 15px; margin-top: 60px;">
            <p style="font-size: 0.9rem; opacity: 0.7; margin-bottom: 15px;">(الآيات التي قمت بحفظها)</p>
            <div id="bookmarks-list" style="width: 100%;"></div>
        </div>
    </div>

    <div id="quranReader-screen" class="screen hidden no-scroll">
        <div class="mushaf-container">
            <button class="mushaf-nav-btn right-btn" onclick="navigatePage(-1)">&#10095;</button>

            <div id="mushaf-page" class="mushaf-page">
                <div class="mushaf-header">
                    <span id="mushaf-juz-name">الجزء</span>
                    <span id="mushaf-surah-name">السورة</span>
                </div>
                
                <div id="quran-text" class="quran-text-container">جاري التحميل...</div>
                
                <div class="mushaf-footer">
                    <span id="mushaf-page-num" class="mushaf-page-num">١</span>
                </div>
            </div>

            <button class="mushaf-nav-btn left-btn" onclick="navigatePage(1)">&#10094;</button>
        </div>
    </div>

    <div id="toast-msg">رسالة</div>
    
    <div id="exit-modal" class="modal hidden">
        <div class="modal-content">
            <p>هل تريد الخروج من التطبيق؟</p>
            <div style="display:flex; gap: 10px; margin-top: 20px;">
                <button class="btn" style="flex: 1;" onclick="confirmExit()">نعم</button>
                <button class="btn" style="flex: 1; background: var(--accent-color); color: var(--bg-color);" onclick="closeExitModal()">لا</button>
            </div>
        </div>
    </div>

    <button id="floating-back-btn" class="floating-back hidden" onclick="goBack()">🔙</button>

    <script> if ('serviceWorker' in navigator) { window.addEventListener('load', () => { navigator.serviceWorker.register('./sw.js'); }); } </script>
    <script src="script.js"></script>
</body>
</html>
