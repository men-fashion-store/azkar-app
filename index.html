<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>موسوعة المسلم</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>

    <div id="sidebar-overlay" class="sidebar-overlay" onclick="toggleSidebar()"></div>
    <div id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <h3>الإعدادات</h3>
            <button onclick="toggleSidebar()" class="close-sidebar">إغلاق</button>
        </div>
        
        <div class="sidebar-section">
            <button class="sidebar-btn" onclick="toggleTheme()">الوضع الليلي / النهاري</button>
            <label class="slider-label">حجم الخط</label>
            <input type="range" id="font-slider" min="1.2" max="3.5" step="0.1" oninput="changeFontSizeSlider(this.value)">
        </div>

        <div class="sidebar-section">
            <label class="section-title">الموقع الجغرافي</label>
            <button class="sidebar-btn" onclick="requestLocationPermission()">تحديث تلقائي للموقع</button>
            <select id="manual-city-select" onchange="setManualLocation()" class="sidebar-select">
                <option value="">اختر مدينتك يدوياً</option>
                <option value="30.8521,32.3167,القنطرة غرب">القنطرة غرب</option>
                <option value="30.5833,32.2667,الإسماعيلية">الإسماعيلية</option>
                <option value="31.2565,32.2841,بورسعيد">بورسعيد</option>
                <option value="29.9668,32.5498,السويس">السويس</option>
                <option value="30.0444,31.2357,القاهرة">القاهرة</option>
                <option value="31.2001,29.9187,الإسكندرية">الإسكندرية</option>
            </select>
        </div>

        <div class="sidebar-section">
            <button class="sidebar-btn" onclick="checkForUpdates()">التحديث لآخر إصدار</button>
            <button class="sidebar-btn" onclick="shareApp()" style="background:var(--accent-color); color:#000;">مشاركة التطبيق</button>
            <p class="share-motto">الدال على الخير كفاعله</p>
        </div>

        <div class="sidebar-item" style="margin-top: auto;">
            <button class="sidebar-btn exit-btn" onclick="exitAppPrompt()">خروج من التطبيق</button>
        </div>
    </div>

    <div id="main-header" class="top-header hidden">
        <button class="hamburger-btn" onclick="toggleSidebar()">☰</button>
        <span class="header-title">موسوعة المسلم</span>
        <div style="width: 30px;"></div>
    </div>

    <div id="splash-screen" class="screen active splash-bg">
        <div class="splash-overlay"></div>
        <div class="splash-content">
            <h1 class="splash-app-name">موسوعة المسلم</h1>
            <div class="hadith-container">
                <p id="splash-hadith" class="splash-hadith-text">جاري التحميل...</p>
                <p id="splash-proof" class="splash-proof-text"></p>
            </div>
            <button class="enter-app-btn" onclick="navigateTo('home')">بِسْمِ اللَّهِ</button>
        </div>
    </div>

    <div id="home-screen" class="screen hidden">
        <div class="home-wrapper">
            <div class="prayer-main-widget" onclick="navigateTo('prayerTimes')">
                <button class="home-menu-btn" onclick="event.stopPropagation(); toggleSidebar();">☰</button>
                <div id="next-prayer-name" class="p-next">جاري الحساب...</div>
                <div id="prayer-countdown" class="p-time">00:00:00</div>
                <div id="prayer-location" class="p-city">تحديد الموقع...</div>
            </div>

            <div class="visual-grid">
                <div class="grid-card quran-bg" onclick="navigateTo('quranIndex')"><span>المصحف</span></div>
                <div class="grid-card azkar-bg" onclick="navigateTo('azkarMenu')"><span>الأذكار</span></div>
                <div class="grid-card masbaha-bg" onclick="navigateTo('masbaha')"><span>السبحة</span></div>
                <div class="grid-card prayer-bg" onclick="navigateTo('prayerTimes')"><span>المواقيت</span></div>
                <div class="grid-card qibla-bg" onclick="navigateTo('qibla')"><span>البوصلة</span></div>
                <div class="grid-card audio-bg" onclick="navigateTo('audioMenu')"><span>الصوتيات</span></div>
            </div>
            <p class="footer-text">صُنِعَ لِوَجْهِ الله</p>
        </div>
    </div>

    <div id="quranIndex-screen" class="screen hidden">
        <div class="surah-list-container">
            <button class="bookmark-entry-btn" onclick="navigateTo('bookmarks')">العلامات المرجعية</button>
            <div id="surah-list" class="surah-vertical-grid"></div>
        </div>
    </div>

    <div id="quranReader-screen" class="screen hidden">
        <div class="quran-reader-content">
            <h2 id="current-surah-name" class="reader-surah-title"></h2>
            <div id="quran-text" class="reader-text-container"></div>
        </div>
        <button id="quran-fab" class="fab-btn" onclick="toggleQuranMenu()">+</button>
        <div id="quran-fab-menu" class="fab-options hidden">
            <button onclick="playSelectedAyah()">استماع</button>
            <button onclick="showTafsir()">تفسير</button>
            <button onclick="toggleBookmarkBtn()">حفظ مرجع</button>
            <button onclick="navigateSurah(1)">التالية</button>
            <button onclick="navigateSurah(-1)">السابقة</button>
            <button onclick="goBack()">الفهرس</button>
        </div>
    </div>

    <div id="azkarMenu-screen" class="screen hidden">
        <div class="menu-list">
            <button class="menu-btn" onclick="startAzkar('morning')">أذكار الصباح</button>
            <button class="menu-btn" onclick="startAzkar('evening')">أذكار المساء</button>
            <button class="menu-btn" onclick="startAzkar('sleep')">أذكار النوم</button>
            <button class="menu-btn" onclick="startAzkar('prayer')">أذكار بعد الصلاة</button>
            <button class="menu-btn" onclick="startAzkar('ruqyah')">الرقية الشرعية</button>
        </div>
    </div>

    <div id="azkarReader-screen" class="screen hidden">
        <div class="zikr-progress-bar"><div id="progress-bar" class="progress-fill"></div></div>
        <div id="zikr-card" class="zikr-full-card">
            <div id="zikr-text"></div>
            <p id="zikr-proof" class="zikr-proof"></p>
            <button id="counter-btn" class="zikr-counter">0</button>
        </div>
    </div>

    <div id="masbaha-screen" class="screen hidden">
        <div class="masbaha-area">
            <div id="masbaha-count" class="m-count">0</div>
            <button class="m-main-btn" onclick="incrementMasbaha()">تسبيح</button>
            <button class="m-reset" onclick="resetMasbaha()">تصفير</button>
        </div>
    </div>

    <div id="bookmarks-screen" class="screen hidden">
        <div class="bookmarks-container">
            <div id="bookmarks-list"></div>
        </div>
    </div>

    <div id="tafsir-modal" class="modal hidden">
        <div class="tafsir-card">
            <h3>التفسير</h3>
            <div id="tafsir-text"></div>
            <button onclick="closeTafsirModal()" class="modal-close-btn">إغلاق</button>
        </div>
    </div>

    <div id="exit-modal" class="modal hidden">
        <div class="exit-card">
            <p>هل تريد الخروج من التطبيق؟</p>
            <div class="exit-actions">
                <button onclick="confirmExit()" class="exit-yes">نعم</button>
                <button onclick="closeExitModal()" class="exit-no">لا</button>
            </div>
        </div>
    </div>

    <div id="toast-msg"></div>
    <audio id="ayah-audio-player"></audio>
    <script src="script.js"></script>
</body>
</html>
