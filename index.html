<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>موسوعة المسلم</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>

    <div id="sidebar-overlay" class="sidebar-overlay" onclick="toggleSidebar()"></div>
    <div id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <h3>الإعدادات</h3>
            <button onclick="toggleSidebar()" class="close-sidebar">إغلاق</button>
        </div>
        
        <div class="sidebar-section">
            <button class="sidebar-btn" onclick="toggleTheme()">الوضع الليلي / النهاري</button>
            <label style="display:block; text-align:center; margin:15px 0 10px;">حجم الخط</label>
            <input type="range" id="font-slider" min="1.2" max="3.5" step="0.1" oninput="changeFontSizeSlider(this.value)" style="width: 100%;">
        </div>

        <div class="sidebar-section">
            <label style="display:block; text-align:center; margin-bottom:10px; color:var(--accent-color); font-weight:bold;">التنبيهات والأصوات</label>
            <select id="muezzin-select" class="sidebar-select" style="margin-bottom: 10px;">
                <option value="">صوت المؤذن</option>
                <option value="makkah">أذان مكة</option>
            </select>
            <button class="sidebar-btn" onclick="checkForUpdates()">التحديث لآخر إصدار</button>
        </div>

        <div class="sidebar-section">
            <button class="sidebar-btn" style="background-color: var(--accent-color); color: var(--bg-color);" onclick="shareApp()">مشاركة التطبيق</button>
            <p style="font-size: 0.9rem; color: var(--accent-color); text-align: center; margin-top: 8px; font-family: 'Amiri', serif;">« الدال على الخير كفاعله »</p>
        </div>

        <div class="sidebar-item" style="margin-top: auto; border-bottom: none;">
            <button class="sidebar-btn exit-btn" onclick="exitAppPrompt()">خروج من التطبيق</button>
        </div>
    </div>

    <div id="main-header" class="top-header hidden">
        <button class="hamburger-btn" onclick="toggleSidebar()">☰</button>
        <span id="header-title" class="header-title">موسوعة المسلم</span>
        <div style="width: 30px;"></div>
    </div>

    <div id="splash-screen" class="screen active splash-bg">
        <div class="splash-overlay"></div>
        <div class="splash-content">
            <h2 class="splash-title">موسوعة المسلم</h2>
            <div class="hadith-box">
                <p id="splash-hadith" class="splash-text">جاري التحميل...</p>
                <p id="splash-proof" class="proof-text"></p>
            </div>
            <button class="btn enter-btn" onclick="navigateTo('home')">بِسْمِ اللَّهِ</button>
        </div>
    </div>

    <div id="home-screen" class="screen hidden">
        <div class="home-content">
            <div class="prayer-widget" onclick="navigateTo('prayerTimes')">
                <div class="prayer-info">
                    <span id="next-prayer-name">جاري الحساب...</span>
                    <span id="prayer-countdown">00:00:00</span>
                </div>
                <div class="prayer-location" id="prayer-location">تحديد الموقع...</div>
            </div>

            <div class="main-grid">
                <div class="card-item quran-bg" onclick="navigateTo('quranIndex')">
                    <div class="card-overlay"><span>المصحف</span></div>
                </div>
                <div class="card-item azkar-bg" onclick="navigateTo('azkarMenu')">
                    <div class="card-overlay"><span>الأذكار</span></div>
                </div>
                <div class="card-item masbaha-bg" onclick="navigateTo('masbaha')">
                    <div class="card-overlay"><span>السبحة</span></div>
                </div>
                <div class="card-item prayer-bg" onclick="navigateTo('prayerTimes')">
                    <div class="card-overlay"><span>مواقيت الصلاة</span></div>
                </div>
                <div class="card-item qibla-bg" onclick="navigateTo('qibla')">
                    <div class="card-overlay"><span>البوصلة</span></div>
                </div>
                <div class="card-item audio-bg" onclick="navigateTo('audioMenu')">
                    <div class="card-overlay"><span>الصوتيات</span></div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast-msg">رسالة</div>

    <script src="script.js"></script>
</body>
</html>
